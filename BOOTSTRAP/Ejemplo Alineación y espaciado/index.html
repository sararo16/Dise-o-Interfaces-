<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Alineación y espaciado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      .fila {
        height: 100px;
      }
    </style>
  </head>
  <body class="bg-light p-3">
    <div class="container border p-4 bg-white">
      <div
        class="row fila justify-content-center align-items-center mb-3 bg-primary"
      >
        <div class="col-4 bg-white border text-center p-2">Columna 1</div>
      </div>

      <div class="row fila g-0 border mb-3">
        <div
          class="col-3 align-items-center justify-content-center bg-warning d-flex align-items-center ps-2"
        >
          Columna A
        </div>
        <div class="col-1 bg-success"></div>
        <div
          class="col-3 bg-danger d-flex align-items-center justify-content-center text-white"
        >
          Columna B
        </div>
        <div class="col-1 bg-success"></div>
        <div
          class="col-3 bg-info d-flex align-items-center justify-content-center"
        >
          Columna C
        </div>
        <div class="col bg-success"></div>
      </div>

      <div class="row fila g-0 border mb-3">
        <div class="col-2 bg-warning"></div>
        <div
          class="col-2 bg-white border d-flex align-items-center justify-content-center"
        >
          Elemento 1
        </div>
        <div class="col-3 bg-warning"></div>
        <div
          class="col-2 bg-secondary d-flex align-items-center justify-content-center text-white"
        >
          Elemento 2
        </div>
        <div class="col bg-warning"></div>
      </div>

      <div class="border">
        <div class="bg-dark" style="height: 18px"></div>
        <div class="row g-0" style="height: 55px">
          <div
            class="col-6 bg-primary text-white align-items-center text-start"
          >
            Izquierda
          </div>
          <div class="col-6 bg-success text-white align-items-center text-end">
            Derecha
          </div>
        </div>
        <div class="bg-dark" style="height: 18px"></div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
